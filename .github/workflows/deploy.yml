name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::600775874112:role/slackmail-github-deployer
          aws-region: us-east-1

      - run: sam build

      - run: |
          sam deploy \
            --parameter-overrides \
              AnthropicApiKey="${{ secrets.ANTHROPIC_API_KEY }}" \
              SlackWebhooks="${{ secrets.SLACK_WEBHOOKS }}" \
              ApiKey="${{ secrets.API_KEY }}"
