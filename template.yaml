AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: slackmail - email router to Slack using Claude AI

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
  SlackWebhooks:
    Type: String
    NoEcho: true
    Description: 'JSON object mapping channel names to Slack webhook URLs, e.g. {"inbox":"https://...","clients":"https://..."}'
  ApiKey:
    Type: String
    NoEcho: true
    Description: 'Bearer token required on all requests except /health'

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 20
    MemorySize: 128
    Environment:
      Variables:
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        SLACK_WEBHOOKS: !Ref SlackWebhooks
        API_KEY: !Ref ApiKey

Resources:
  EmailRouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: .
      LogRetentionInDays: 7
      Events:
        EmailPost:
          Type: HttpApi
          Properties:
            Path: /email
            Method: POST
        HealthGet:
          Type: HttpApi
          Properties:
            Path: /health
            Method: GET
        SlackPost:
          Type: HttpApi
          Properties:
            Path: /slack
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
